<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body { font-family: Georgia, serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.7; }
    h1 { font-size: 28px; margin-bottom: 4px; }
    .post-date { color: #888; font-size: 14px; margin-bottom: 24px; }
    .post-body { white-space: pre-wrap; font-size: 17px; }
    a { color: #07c; }
  </style>
</head>
<body>
  <p><a href="/">&larr; All posts</a></p>
  <h1>{{title}}</h1>
  <div class="post-date">{{created_at}}</div>
  <div class="post-body">{{body}}</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{#if post}}Edit Post{{else}}New Post{{/if}} — Admin</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    label { display: block; margin-top: 16px; font-weight: bold; }
    input[type="text"] { width: 100%; padding: 8px; font-size: 16px; box-sizing: border-box; }
    textarea { width: 100%; height: 400px; padding: 8px; font-size: 15px; font-family: sans-serif; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 24px; font-size: 16px; cursor: pointer; }
    a { color: #07c; }
  </style>
</head>
<body>
  <p><a href="/admin">&larr; Back to all posts</a></p>

  <h1>{{#if post}}Edit Post{{else}}New Post{{/if}}</h1>

  <form method="POST" action="{{formAction}}">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" value="{{title}}" required>

    <label for="body">Body (plain text)</label>
    <textarea id="body" name="body" required>{{body}}</textarea>

    <button type="submit">{{#if post}}Save Changes{{else}}Create Post{{/if}}</button>
  </form>
</body>
</html>
